name: commitlint

on:
  pull_request:
    branches:
      - 'develop'
      - 'main'

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install commit-lint
        run: |
          npm install --force conventional-changelog-conventionalcommits @commitlint/config-conventional commitlint@latest
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: npx commitlint --from HEAD~1 --to HEAD --verbose
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$BASE_REF"
          FROM=$(git merge-base "origin/$BASE_REF" "$HEAD_SHA")
          npx commitlint --from "$FROM" --to "$HEAD_SHA" --verbose
      - name: Validate PR title with commitlint
        if: github.event_name == 'pull_request'
        run: |
          echo "${{github.event.pull_request.title}}" | npx commitlint 
