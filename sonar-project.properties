sonar.projectKey=aphp_Cohort360-Back-end
sonar.organization=aphp
sonar.qualitygate.wait=true
sonar.python.version=3
sonar.python.coverage.reportPaths=./coverage.xml
sonar.issue.ignore.multicriteria=todos,comments
sonar.issue.ignore.multicriteria.todos.ruleKey=python:S1135
sonar.issue.ignore.multicriteria.todos.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.comments.ruleKey=python:S125
sonar.issue.ignore.multicriteria.comments.resourceKey=**/*.py
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/tests/**/*.py
sonar.exclusions=**/migrations/**,**/tests/**,manage.py
sonar.text.excluded.file.suffixes=.png,.jpg,.jpeg,.gif,.svg